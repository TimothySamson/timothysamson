title = "Timothy Samson"
description = "journal, math blog, political ramblings "
default_language = "en"

# The URL the site will be built for
base_url = "https://timothysamson.pages.dev"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true


taxonomies = [
  {name = "tags"},
]

[extra.social]
github = "TimothySamson"
stackoverflow = "823214" # use user_id
mastodon = "mathstodon.xyz/@aldalire" # use hostname/@username
